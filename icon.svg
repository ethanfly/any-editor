<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!--
    Minimal flat mark: centered orange text lines on white,
    with a green caret on the last line = typing.
  -->
  <defs>
    <clipPath id="tile">
      <rect width="1024" height="1024" rx="224" ry="224"/>
    </clipPath>
  </defs>

  <g clip-path="url(#tile)">
    <rect width="1024" height="1024" rx="224" ry="224" fill="#FFFFFF"/>

    <rect
      x="24" y="24" width="976" height="976" rx="200" ry="200"
      fill="none" stroke="#E9EDF1" stroke-width="16"
    />

    <!-- Text lines, centered -->
    <g fill="#F1953F">
      <rect x="212" y="292" width="600" height="80" rx="40"/>
      <rect x="272" y="420" width="480" height="80" rx="40"/>
      <rect x="172" y="548" width="680" height="80" rx="40"/>
      <!-- Last line shorter, room for caret -->
      <rect x="332" y="676" width="280" height="80" rx="40"/>
    </g>

    <!-- Green typing caret after last line -->
    <rect x="640" y="668" width="28" height="96" rx="14" fill="#55B981"/>
  </g>
</svg>
