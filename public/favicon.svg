<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Background circle - lighter warm orange -->
  <circle cx="64" cy="64" r="56" fill="#ffb46b"/>

  <!-- Chameleon - centered, clear silhouette -->
  <g transform="translate(64,64)">
    <!-- Tail - spiral curl, classic chameleon feature -->
    <path d="M -16 22
             C -32 24, -40 8, -34 -4
             C -26 -18, -4 -22, 2 -8
             C 6 2, 8 16, 12 24"
          fill="none" stroke="#3da06a" stroke-width="8" stroke-linecap="round"/>

    <!-- Body -->
    <ellipse cx="4" cy="10" rx="16" ry="10" fill="#55b981" transform="rotate(-6,4,10)"/>

    <!-- Belly highlight -->
    <ellipse cx="2" cy="13" rx="10" ry="5" fill="#6dca90" transform="rotate(-6,2,13)"/>

    <!-- Head - larger, more distinct -->
    <ellipse cx="21" cy="2" rx="10" ry="8.5" fill="#55b981"/>

    <!-- Head crest/casque - classic chameleon feature -->
    <path d="M 16 -7 L 14 -16 Q 17 -18 20 -14 Q 22 -10 22 -7"
          fill="#3da06a"/>

    <!-- Eye - prominent, with turret-like ring -->
    <circle cx="24" cy="0" r="6" fill="white"/>
    <circle cx="25" cy="-0.5" r="4.5" fill="#ff8c42"/>
    <circle cx="26" cy="-1" r="2.5" fill="#20242a"/>
    <circle cx="26.8" cy="-1.8" r="0.9" fill="white"/>

    <!-- Mouth line -->
    <path d="M 28 4.5 Q 30 5.5 29 6.5" fill="none" stroke="#3da06a" stroke-width="1.2" stroke-linecap="round"/>

    <!-- Front leg -->
    <path d="M 8 18 Q 6 26 2 28" fill="none" stroke="#55b981" stroke-width="5" stroke-linecap="round"/>
    <circle cx="2" cy="28" r="2.5" fill="#3da06a"/>

    <!-- Back leg -->
    <path d="M -4 17 Q -8 25 -12 27" fill="none" stroke="#55b981" stroke-width="5" stroke-linecap="round"/>
    <circle cx="-12" cy="27" r="2.5" fill="#3da06a"/>
  </g>
</svg>
