<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8a85b"/>
      <stop offset="40%" stop-color="#f1953f"/>
      <stop offset="100%" stop-color="#55b981"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f4f0"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="64" cy="64" r="58" fill="url(#bgGrad)"/>
  <circle cx="64" cy="64" r="55" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>

  <!-- Chameleon body - curled tail -->
  <g transform="translate(64,64) scale(1.05)">
    <!-- Tail curl -->
    <path d="M -28 15 Q -38 0 -34 -14 Q -28 -28 -14 -28 Q -2 -28 4 -16 Q 8 -6 4 4"
          fill="none" stroke="white" stroke-width="7" stroke-linecap="round" opacity="0.9"/>

    <!-- Body -->
    <ellipse cx="-6" cy="8" rx="20" ry="14" fill="white" opacity="0.92" transform="rotate(-10,-6,8)"/>

    <!-- Back spikes -->
    <path d="M -18 -2 L -16 -8 L -12 -4 L -8 -10 L -4 -4 L 2 -8 L 6 -2"
          fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>

    <!-- Head -->
    <ellipse cx="16" cy="2" rx="11" ry="9" fill="white" opacity="0.95" transform="rotate(-5,16,2)"/>

    <!-- Helmet/crest -->
    <path d="M 12 -8 Q 18 -18 22 -12 Q 24 -8 20 -6"
          fill="white" opacity="0.7"/>

    <!-- Eye -->
    <circle cx="20" cy="1" r="5" fill="#f1953f" opacity="0.9"/>
    <circle cx="21" cy="0" r="2.5" fill="#20242a"/>
    <circle cx="21.8" cy="-0.8" r="0.9" fill="white"/>

    <!-- Mouth line -->
    <path d="M 24 5 Q 26 6 25 7" fill="none" stroke="#20242a" stroke-width="1.2" stroke-linecap="round" opacity="0.3"/>

    <!-- Front legs -->
    <path d="M -4 18 L -8 28 L -12 30" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
    <path d="M 6 18 L 4 28 L 0 30" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>

    <!-- Back legs -->
    <path d="M -18 16 L -22 26 L -26 28" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
    <path d="M -10 18 L -12 28 L -16 30" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>

    <!-- Tongue hint -->
    <path d="M 25 7.5 Q 28 8 29 7" fill="none" stroke="#f1953f" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  </g>
</svg>
