name: Bump Version

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        type: choice
        options: [patch, minor, major, none]
        default: patch

permissions:
  contents: write
  actions: write

jobs:
  bump:
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.bump != 'none' ||
      github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.do-bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Need a token that can push commits/tags and trigger follow-up workflows.
          # Default GITHUB_TOKEN push events do not start new workflows.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version
        id: do-bump
        run: |
          BUMP="${{ github.event.inputs.bump || 'patch' }}"
          CURRENT=$(node -p "JSON.parse(require('fs').readFileSync('./src-tauri/tauri.conf.json','utf8')).version")
          echo "Current: $CURRENT"
          IFS='.' read -r MAJ MIN PAT <<< "$CURRENT"
          case "$BUMP" in
            major) MAJ=$((MAJ+1)); MIN=0; PAT=0 ;;
            minor) MIN=$((MIN+1)); PAT=0 ;;
            *)     PAT=$((PAT+1)) ;;
          esac
          NEW="${MAJ}.${MIN}.${PAT}"
          echo "New: $NEW"
          echo "version=$NEW" >> $GITHUB_OUTPUT

          node -e "
            const fs=require('fs');
            const c=JSON.parse(fs.readFileSync('./src-tauri/tauri.conf.json','utf8'));
            c.version='$NEW';fs.writeFileSync('./src-tauri/tauri.conf.json',JSON.stringify(c,null,2)+'\n');
            let t=fs.readFileSync('./src-tauri/Cargo.toml','utf8');
            t=t.replace(/^version = \".*\"/m,'version = \"$NEW\"');
            fs.writeFileSync('./src-tauri/Cargo.toml',t);
            const pkg=JSON.parse(fs.readFileSync('./package.json','utf8'));
            pkg.version='$NEW';
            fs.writeFileSync('./package.json',JSON.stringify(pkg,null,2)+'\n');
          "

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src-tauri/tauri.conf.json src-tauri/Cargo.toml package.json
          # [skip ci] prevents this bump commit from re-triggering Bump Version.
          # Build is started explicitly below via workflow_call (tag push alone is
          # also skipped when the accompanying commit message contains [skip ci]).
          git commit -m "chore: bump to v${NEW} [skip ci]"
          git tag -a "v${NEW}" -m "v${NEW}"
          git push origin HEAD:main --tags

  # Explicitly invoke Build & Release after bump.
  # Do NOT rely on tag push events: pushing a [skip ci] commit + tag in one push
  # causes GitHub to skip ALL workflows for that push, including tag-triggered builds.
  build-release:
    needs: bump
    if: needs.bump.outputs.version != ''
    uses: ./.github/workflows/build.yml
    with:
      version: ${{ needs.bump.outputs.version }}
    secrets: inherit
