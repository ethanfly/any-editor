name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 0.1.9)'
        type: string
        required: false
  workflow_call:
    inputs:
      version:
        type: string
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "value=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            TAG="${{ github.ref_name }}"
            echo "value=${TAG#v}" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Set version in config
        shell: bash
        run: |
          node -e "
            const fs=require('fs');
            const c=JSON.parse(fs.readFileSync('./src-tauri/tauri.conf.json','utf8'));
            c.version='${{ steps.version.outputs.value }}';
            fs.writeFileSync('./src-tauri/tauri.conf.json',JSON.stringify(c,null,2)+'\n');
            let t=fs.readFileSync('./src-tauri/Cargo.toml','utf8');
            t=t.replace(/^version = \".*\"/m,'version = \"${{ steps.version.outputs.value }}\"');
            fs.writeFileSync('./src-tauri/Cargo.toml',t);
          "

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: pnpm tauri build --bundles nsis

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: pnpm tauri build --bundles dmg

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: pnpm tauri build --bundles deb

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-${{ matrix.target }}
          path: src-tauri/target/release/bundle/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          pattern: '*'
          path: artifacts/

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "value=v${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "value=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Generate changelog
        id: changelog
        run: |
          CURRENT_TAG="${{ steps.version.outputs.value }}"
          PREV_TAG=$(git tag --sort=-v:refname | grep "^v" | grep -v "^${CURRENT_TAG}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s" --no-merges "${CURRENT_TAG}")
          else
            CHANGELOG=$(git log --pretty=format:"- %s" --no-merges "${PREV_TAG}..${CURRENT_TAG}")
          fi
          CHANGELOG=$(echo "$CHANGELOG" | grep -v "chore: bump to" || true)
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="_（无用户可见变更）_"
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        shell: bash

      - name: Display structure
        run: ls -R artifacts/ || echo "No artifacts found"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.value }}
          name: "Any Editor ${{ steps.version.outputs.value }}"
          body: |
            ## Any Editor ${{ steps.version.outputs.value }}

            ### 更新内容
            ${{ steps.changelog.outputs.changelog }}

            ### 安装
            - **Windows**: `.exe` 安装包
            - **macOS**: `.dmg` 镜像
            - **Linux**: `.deb` 包
          draft: false
          prerelease: false
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}